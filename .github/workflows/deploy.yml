name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AUTO_SET_WEBHOOK: ${{ secrets.AUTO_SET_WEBHOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        run: >
          npx wrangler deploy
          --var BOT_TOKEN:${{ secrets.BOT_TOKEN }}
          --var ADMIN_GROUP_ID:${{ secrets.ADMIN_GROUP_ID }}
          --var WEBHOOK_SECRET:${{ secrets.WEBHOOK_SECRET }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Telegram webhook
        if: ${{ env.AUTO_SET_WEBHOOK != 'false' }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
            -d "url=${{ secrets.WORKER_URL }}/hook/${{ secrets.WEBHOOK_SECRET }}" \
            -d "drop_pending_updates=true"
