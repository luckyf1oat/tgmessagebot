name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Ensure KV namespace and bind it
        run: npm run prepare:kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: tg-worker-support-bot
          KV_NAMESPACE_TITLE: tg-worker-support-bot-kv

      - name: Deploy to Cloudflare Workers
        run: >
          npx wrangler deploy
          --var BOT_TOKEN:${{ secrets.BOT_TOKEN }}
          --var ADMIN_GROUP_ID:${{ secrets.ADMIN_GROUP_ID }}
          --var WEBHOOK_SECRET:${{ secrets.WEBHOOK_SECRET }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
